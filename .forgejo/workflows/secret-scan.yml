on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Secret Scanner Trufflehog
    runs-on: debian-13
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Secret Scanning
      uses: https://github.com/trufflesecurity/trufflehog@main
      with:
        extra_args: --results=verified,unknown
